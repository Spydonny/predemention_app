name: predemention_app
description: "PreDemention — AI-powered gait analysis for early dementia detection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_maps_flutter: ^2.10.1
  fl_chart: ^0.70.2
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
